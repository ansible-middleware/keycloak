---
- name: "Configure sysconfig file for service: {{ keycloak.service_name }}"
  become: "{{ keycloak_quarkus_systemd_require_privilege_escalation | default(true) }}"
  ansible.builtin.template:
    src: keycloak-sysconfig.j2
    dest: "{{ keycloak_quarkus_sysconf_file }}"
    owner: root
    group: root
    mode: '0640'
  vars:
    keycloak_sys_pkg_java_home: "{{ keycloak_quarkus_pkg_java_home }}"
  notify:
    - rebuild keycloak config
    - restart keycloak

- name: "Configure systemd unit file for keycloak service"
  ansible.builtin.template:
    src: keycloak.service.j2
    dest: /etc/systemd/system/keycloak.service
    owner: root
    group: root
    mode: '0644'
  become: "{{ keycloak_quarkus_systemd_require_privilege_escalation | default(true) }}"
  register: keycloak_quarkus_systemdunit
  notify:
    - rebuild keycloak config
    - restart keycloak
